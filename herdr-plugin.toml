# herdr plugin: PC RAM & CPU Usage Overlay (CPU / RAM per space)
#
# Shows CPU and RAM usage per space (workspace), grouped under each space's
# git branch name. herdr plugin v1 has no API to draw into the sidebar, so the
# data is surfaced two ways:
#   - a live terminal pane  ("Space usage" overlay)
#   - a one-shot action     ("Space usage report")
#
# Install:     herdr plugin install ezcorp-org/herdr-pc-ram-and-cpu-usage-overlay
# Local dev:   herdr plugin link /path/to/herdr-pc-ram-and-cpu-usage-overlay   (references the dir in place)
# Remove:      herdr plugin unlink ez-corp.space-usage
# Logs:        herdr plugin log list --plugin ez-corp.space-usage

id = "ez-corp.space-usage"
name = "PC RAM & CPU Usage Overlay"
version = "1.0.0"
# 0.7.0 covers the live pane, report action, and agents-panel pseudo-agent.
# The native sidebar/agents token surface (the `$usage` custom token in the
# spaces card / agents panel) additionally needs a herdr build with metadata
# tokens (workspace.report_metadata / pane.report_metadata `tokens`) —
# available on recent 0.7.x (verified on 0.7.4). Without it, those config rows
# simply render nothing; the pane and report action still work.
# The per-agent cache countdown ($cache token in [ui.sidebar.agents]) resets to
# `cache_minutes` (default 60) when a claude agent goes idle and ticks to 0.
min_herdr_version = "0.7.0"
description = "CPU and RAM usage per space, grouped under the branch name."
platforms = ["linux", "windows"]

# Commands are argv arrays (no shell) and run with the plugin dir as cwd,
# per https://herdr.dev/docs/plugins/#trust-and-security

# Compiled at install time: herdr runs this once with the plugin root as cwd.
# The resulting ./target/release/space-usage (space-usage.exe on Windows) is
# what every pane/action command below invokes.
#
# Linux invokes the binary directly with a relative path. Windows CANNOT: herdr
# spawns the command with an extended-length (`\\?\C:\..`) working directory,
# and Windows CreateProcessW cannot resolve a relative `./target/..` path
# against a `\\?\` cwd (fails with "path not found" — verified on herdr 0.7.4,
# for both panes and, depending on cwd, actions). The Windows variants below
# therefore go through a small PowerShell launcher that builds an ABSOLUTE path
# from HERDR_PLUGIN_ROOT (stripping the `\\?\` prefix) and runs the exe
# directly. This is cwd-independent and works for both one-shot actions and
# long-running panes.
#
# herdr 0.7.4 rejects duplicate pane/action ids even when the entries carry
# disjoint `platforms` lists (verified via `herdr plugin link .`, error
# duplicate_plugin_action_id). So the Windows pane/action variants below use
# a distinct `-win`-suffixed id instead of reusing the Linux id.
[[build]]
command = ["cargo", "build", "--release"]
platforms = ["linux"]

[[build]]
command = ["cargo", "build", "--release"]
platforms = ["windows"]

# Live, self-refreshing dashboard. Opened as a temporary zoomed overlay pane.
[[panes]]
id = "dashboard"
title = "Space usage"
placement = "overlay"
command = ["./target/release/space-usage", "--interval", "2"]
platforms = ["linux"]

[[panes]]
id = "dashboard-win"
title = "Space usage"
placement = "overlay"
command = ["powershell", "-NoProfile", "-ExecutionPolicy", "Bypass", "-Command", "$r=$env:HERDR_PLUGIN_ROOT; if($r.StartsWith('\\\\?\\')){$r=$r.Substring(4)}; & (Join-Path $r 'target\\release\\space-usage.exe') --interval 2"]
platforms = ["windows"]

# One-shot snapshot printed to stdout / plugin log.
[[actions]]
id = "report"
title = "Space usage report"
contexts = ["workspace"]
command = ["./target/release/space-usage", "--once"]
platforms = ["linux"]

[[actions]]
id = "report-win"
title = "Space usage report"
contexts = ["workspace"]
command = ["powershell", "-NoProfile", "-ExecutionPolicy", "Bypass", "-Command", "$r=$env:HERDR_PLUGIN_ROOT; if($r.StartsWith('\\\\?\\')){$r=$r.Substring(4)}; & (Join-Path $r 'target\\release\\space-usage.exe') --once"]
platforms = ["windows"]

# Sidebar status updater: a background daemon that pushes each space's usage
# as display-only metadata on a spare shell pane; the locally patched herdr
# renders it as a third row in the sidebar spaces card. Statuses carry a TTL,
# so they self-clear if the daemon dies.
[[actions]]
id = "status-toggle"
title = "Toggle sidebar usage status"
command = ["./target/release/space-usage", "--toggle"]
platforms = ["linux"]

[[actions]]
id = "status-toggle-win"
title = "Toggle sidebar usage status"
command = ["powershell", "-NoProfile", "-ExecutionPolicy", "Bypass", "-Command", "$r=$env:HERDR_PLUGIN_ROOT; if($r.StartsWith('\\\\?\\')){$r=$r.Substring(4)}; & (Join-Path $r 'target\\release\\space-usage.exe') --toggle"]
platforms = ["windows"]

[[actions]]
id = "status-enable"
title = "Enable sidebar usage status"
command = ["./target/release/space-usage", "--enable"]
platforms = ["linux"]

[[actions]]
id = "status-enable-win"
title = "Enable sidebar usage status"
command = ["powershell", "-NoProfile", "-ExecutionPolicy", "Bypass", "-Command", "$r=$env:HERDR_PLUGIN_ROOT; if($r.StartsWith('\\\\?\\')){$r=$r.Substring(4)}; & (Join-Path $r 'target\\release\\space-usage.exe') --enable"]
platforms = ["windows"]

[[actions]]
id = "status-disable"
title = "Disable sidebar usage status"
command = ["./target/release/space-usage", "--disable"]
platforms = ["linux"]

[[actions]]
id = "status-disable-win"
title = "Disable sidebar usage status"
command = ["powershell", "-NoProfile", "-ExecutionPolicy", "Bypass", "-Command", "$r=$env:HERDR_PLUGIN_ROOT; if($r.StartsWith('\\\\?\\')){$r=$r.Substring(4)}; & (Join-Path $r 'target\\release\\space-usage.exe') --disable"]
platforms = ["windows"]

# Always-on: auto-start the updater when a workspace is focused. This fires on
# herdr launch for the initially-focused space (and on every switch), so the
# usage row appears without a manual toggle. `--enable` is idempotent — it
# no-ops when the daemon is already running — so repeated firing is harmless.
[[events]]
on = "workspace.focused"
command = ["./target/release/space-usage", "--enable"]
platforms = ["linux"]

[[events]]
on = "workspace.focused"
command = ["powershell", "-NoProfile", "-ExecutionPolicy", "Bypass", "-Command", "$r=$env:HERDR_PLUGIN_ROOT; if($r.StartsWith('\\\\?\\')){$r=$r.Substring(4)}; & (Join-Path $r 'target\\release\\space-usage.exe') --enable"]
platforms = ["windows"]
